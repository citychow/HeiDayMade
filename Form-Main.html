    <!--Content-->
    <!-- Title -->
    <div class="container p-5">
        <div class="row mt-5 mx-10">
            <div class="col text-center">
                <h2>Feedback</h2>
                <p>We value your feedback! Please let us know your thoughts.</p>
            </div>
        </div>
   
    </div>

    <!--Content-->
    <form class="container mt-2 mb-5" id="feedback-form">
      <!-- <form class="container mt-2 mb-5" action="./Form-Recieved.html" method="POST" id="feedback-form"></form> -->
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="_replyto" required>
        </div>
        <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
