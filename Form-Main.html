<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Oooh+Baby&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&display=swap" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
    <title>HeiDayMade | Submit a Form</title>
</head>
<body>
    <div id="navbar"></div>
    <!--Content-->
    <!-- Title -->
    <div class="container p-5">
        <div class="row mt-5 mx-10">
            <div class="col text-center">
                <h2><span class="gif" data-type="feedback"></span>Feedback<span class="gif" data-type="feedback"></span></h2>
                <p>I value your feedback! Please let me know your thoughts.</p>
            </div>
        </div>
   
    </div>

    <!--Content-->
    <form class="container mt-2 mb-5" id="feedback-form">
      <!-- <form class="container mt-2 mb-5" action="./Form-Recieved.html" method="POST" id="feedback-form"></form> -->
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="_replyto" required>
        </div>
        <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" name="message" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <!-- Footer --> 
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script type="module" src="./main.js"></script>
    <script src="./form.js"></script>
  </body>
</html>
